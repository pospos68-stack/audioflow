<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AudioFlow</title>

<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:-apple-system, sans-serif;
}

.header{
padding:20px;
font-size:24px;
font-weight:bold;
}

.search{
padding:0 20px 10px;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:white;
}

.now{
padding:10px 20px;
font-size:14px;
opacity:0.8;
}

.container{
padding:10px;
display:grid;
grid-template-columns: repeat(var(--cols, 2), 1fr);
gap:15px;
padding-bottom:140px;
}

.book{
position:relative;
aspect-ratio:1/1;
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.book img{
width:100%;
height:100%;
object-fit:cover;
}

.book-title{
position:absolute;
bottom:0;
left:0;
right:0;
padding:10px;
background:linear-gradient(transparent, rgba(0,0,0,0.85));
}

.book-cat{
position:absolute;
top:8px;
left:8px;
background:rgba(0,0,0,0.7);
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.fav{
position:absolute;
top:8px;
right:8px;
font-size:18px;
cursor:pointer;
}

#categoryTabs{
display:flex;
gap:10px;
padding:10px 20px;
overflow-x:auto;
}

.tab{
padding:6px 12px;
background:#1a1a1a;
border-radius:10px;
cursor:pointer;
font-size:13px;
opacity:0.7;
}

.tab.active{
background:#3a86ff;
opacity:1;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1a1a1a;
padding:10px;
}

.progress{
height:4px;
background:#333;
}

.progress-bar{
height:100%;
background:#3a86ff;
width:0%;
}

.controls{
display:flex;
gap:10px;
}

audio{
flex:1;
}

.menu{
position:fixed;
background:#1a1a1a;
border-radius:10px;
padding:5px;
display:none;
flex-direction:column;
z-index:1000;
}

.menu div{
padding:8px 12px;
cursor:pointer;
}

.menu div:hover{
background:#333;
}
</style>
</head>

<body>

<div class="header">🎧 AudioFlow</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Hledat knihu...">
</div>

<div style="padding:0 20px 10px;">
Velikost dlaždic
<input type="range" min="1" max="6" id="gridSlider">
</div>

<div style="padding:0 20px 10px; display:flex; gap:10px;">
<button onclick="exportData()">💾 Export</button>
<input type="file" id="importFile" style="display:none">
<button onclick="document.getElementById('importFile').click()">📂 Import</button>
</div>

<div id="categoryTabs"></div>

<div class="now" id="nowPlaying">Nic nehraje</div>

<input type="file" id="fileInput" multiple webkitdirectory style="margin:10px">

<div class="container" id="library"></div>

<div id="menu" class="menu"></div>

<div class="player">
<div class="progress"><div id="progressBar" class="progress-bar"></div></div>
<div class="controls">
<button onclick="skip(-15)">⏪</button>
<audio id="audio" controls></audio>
<button onclick="skip(30)">⏩</button>
</div>
</div>

<script>

const categories = [
"Román","Detektivka","Sci-fi","Fantasy",
"Osobní rozvoj","Historie","Thriller","Ostatní"
];

let db, books=[];
let selectedCategory = "Vše";

const audio = document.getElementById("audio");
const library = document.getElementById("library");
const progressBar = document.getElementById("progressBar");
const menu = document.getElementById("menu");
const slider = document.getElementById("gridSlider");
const searchInput = document.getElementById("searchInput");
const nowPlaying = document.getElementById("nowPlaying");

/* slider */
slider.value = localStorage.getItem("cols") || 2;
document.documentElement.style.setProperty("--cols", slider.value);

slider.oninput=()=>{
localStorage.setItem("cols", slider.value);
document.documentElement.style.setProperty("--cols", slider.value);
render();
};

/* tabs */
function renderTabs(){
const tabs = document.getElementById("categoryTabs");
tabs.innerHTML = "";

[
"⏱ Pokračovat",
"🕒 Naposled poslouchané",
"🆕 Naposled přidané",
"⭐ Oblíbené",
"Vše",
...categories
].forEach(cat => {

const div = document.createElement("div");
div.className = "tab" + (cat === selectedCategory ? " active" : "");
div.innerText = cat;

div.onclick = () => {
selectedCategory = cat;
renderTabs();
render();
};

tabs.appendChild(div);

});
}

/* DB */
const req=indexedDB.open("AudioBooksDB",1);
req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("books",{keyPath:"name"});
};
req.onsuccess=e=>{
db=e.target.result;
loadBooks();
};

function saveBook(b){
db.transaction("books","readwrite").objectStore("books").put(b);
}

function loadBooks(){
db.transaction("books","readonly").objectStore("books").getAll().onsuccess=e=>{
books=e.target.result;
renderTabs();
render();
};
}

/* upload */
document.getElementById("fileInput").onchange=async function(){

let grouped={};

for(let f of this.files){

if(f.name.endsWith(".m3u")) continue;

let folder=(f.webkitRelativePath||f.name).split("/")[0];

if(!grouped[folder]){
grouped[folder]={
name:folder,
chapters:[],
cover:null,
currentChapter:0,
currentTime:0,
category:"Ostatní",
favorite:false,
createdAt: Date.now(),
lastPlayed: 0
};
}

const isAudio = f.name.match(/\.(mp3|m4a|aac)$/i);

if(isAudio){
grouped[folder].chapters.push({
name:f.name,
data:await f.arrayBuffer()
});
}

if(f.type.startsWith("image")){
grouped[folder].cover=await f.arrayBuffer();
}
}

Object.values(grouped).forEach(b=>{
b.chapters.sort((a,b)=>a.name.localeCompare(b.name));
saveBook(b);
});

loadBooks();
};

/* search */
searchInput.oninput = () => render();

/* backup */
function exportData(){
const blob = new Blob([JSON.stringify(books)], {type:"application/json"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "backup.json";
a.click();
}

document.getElementById("importFile").onchange = function(){
const reader = new FileReader();
reader.onload = e=>{
JSON.parse(e.target.result).forEach(b=>saveBook(b));
loadBooks();
};
reader.readAsText(this.files[0]);
};

/* menu */
function openMenu(x,y,book){

menu.innerHTML="";
menu.style.display="flex";
menu.style.left=x+"px";
menu.style.top=y+"px";

categories.forEach(cat=>{
let item=document.createElement("div");
item.innerText=cat;

item.onclick=()=>{
book.category=cat;
saveBook(book);
menu.style.display="none";
render();
};

menu.appendChild(item);
});
}

window.onclick=()=>menu.style.display="none";

/* render */
function render(){

library.innerHTML="";
const query = searchInput.value.toLowerCase();

let list = [...books];

if(selectedCategory === "🆕 Naposled přidané"){
list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}

if(selectedCategory === "🕒 Naposled poslouchané"){
list.sort((a,b)=>(b.lastPlayed||0)-(a.lastPlayed||0));
}

if(selectedCategory === "⏱ Pokračovat"){
list = list.filter(b => b.currentTime > 10);
}

list = list.filter(b => {

if(selectedCategory === "⭐ Oblíbené" && !b.favorite) return false;

if(
!["⭐ Oblíbené","Vše","🆕 Naposled přidané","🕒 Naposled poslouchané","⏱ Pokračovat"].includes(selectedCategory)
&& b.category !== selectedCategory
) return false;

if(query && !b.name.toLowerCase().includes(query)) return false;

return true;

});

list.forEach(b=>{

let div=document.createElement("div");
div.className="book";

let cover=b.cover?URL.createObjectURL(new Blob([b.cover])):"";

div.innerHTML=`
${cover?`<img src="${cover}">`:`<div style="width:100%;height:100%;background:#333"></div>`}
<div class="book-cat">📂 ${b.category}</div>
<div class="book-title">${b.name}</div>
<div class="fav">${b.favorite ? "⭐" : "☆"}</div>
`;

div.onclick=()=>play(b);

div.querySelector(".fav").onclick = (e) => {
e.stopPropagation();
b.favorite = !b.favorite;
saveBook(b);
render();
};

div.oncontextmenu=(e)=>{
e.preventDefault();
openMenu(e.pageX,e.pageY,b);
};

library.appendChild(div);
});
}

/* play */
function play(b){

b.lastPlayed = Date.now();

let ch=b.currentChapter||0;
let t=b.currentTime||0;

let chapter=b.chapters[ch];

audio.src=URL.createObjectURL(new Blob([chapter.data]));
audio.currentTime=t;
audio.play();

nowPlaying.innerText = `🎧 ${b.name} — ${chapter.name}`;

audio.ontimeupdate=()=>{
b.currentTime=audio.currentTime;
progressBar.style.width=(audio.currentTime/audio.duration*100)+"%";
saveBook(b);
};

audio.onended=()=>{
if(ch+1<b.chapters.length){
b.currentChapter++;
play(b);
}
};
}

function skip(s){
audio.currentTime+=s;
}

</script>

</body>
</html>
